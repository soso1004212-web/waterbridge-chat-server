<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 상담 페이지</title>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
}

#left {
  width: 30%;
  border-right: 1px solid #333;
  height: 100vh;
  overflow-y: auto;
}

#right {
  flex: 1;
  padding: 20px;
}

.session {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.session:hover {
  background: #222;
}

.msg {
  margin: 10px 0;
}

input {
  width: 80%;
  padding: 10px;
}
button {
  padding: 10px;
}
</style>
</head>

<body>

<div id="left">
  <h3>📋 상담 목록</h3>
  <div id="sessions"></div>
</div>

<div id="right">
  <h3>💬 상담창</h3>
  <div id="chat"></div>

  <input id="msgInput" placeholder="답장 입력">
  <button onclick="sendReply()">전송</button>
</div>

<script>
const socket = io("https://waterbridge-chat-server-production.up.railway.app");

let currentSession = null;
const sessions = {};
const chatBox = document.getElementById("chat");
const sessionBox = document.getElementById("sessions");

// 🔥 고객 메시지 수신
socket.on("reply", (data) => {
  console.log("USER MSG:", data);

  const id = data.sessionId;

  if (!sessions[id]) {
    sessions[id] = [];
    addSession(id);
  }

  sessions[id].push("고객: " + data.text);

  if (currentSession === id) {
    renderChat(id);
  }
});

// 🔥 세션 클릭
function addSession(id) {
  const div = document.createElement("div");
  div.className = "session";
  div.innerText = "🟢 " + id;

  div.onclick = () => {
    currentSession = id;
    renderChat(id);
  };

  sessionBox.appendChild(div);
}

// 🔥 채팅 렌더
function renderChat(id) {
  chatBox.innerHTML = "";

  (sessions[id] || []).forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = m;
    chatBox.appendChild(div);
  });
}

// 🔥 관리자 답장
function sendReply() {
  const text = document.getElementById("msgInput").value;

  if (!currentSession || !text) return;

  fetch("https://waterbridge-chat-server-production.up.railway.app/reply", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      sessionId: currentSession,
      text
    })
  });

  sessions[currentSession].push("관리자: " + text);
  renderChat(currentSession);

  document.getElementById("msgInput").value = "";
}
</script>

</body>
</html>
