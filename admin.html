<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 콘솔</title>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<style>
body { margin:0; display:flex; height:100vh; background:#0f0f0f; color:white; }

#left { width:300px; background:#1a1a1a; overflow:auto; }
#right { flex:1; display:flex; flex-direction:column; }

.session { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
.session:hover { background:#222; }
.session.active { background:#333; }

#chat { flex:1; padding:15px; overflow:auto; }

.msg { margin:8px 0; padding:8px; border-radius:6px; max-width:70%; }
.user { background:#2a2a2a; }
.admin { background:#d4af37; color:black; margin-left:auto; }
.bot { background:#444; }

#input { display:flex; padding:10px; }
input { flex:1; padding:10px; }
button { padding:10px; }
</style>
</head>

<body>

<div id="left">
  <h3>상담목록</h3>
  <div id="list"></div>
</div>

<div id="right">
  <div id="chat"></div>

  <div id="input">
    <input id="msg" placeholder="답장">
    <button onclick="send()">전송</button>
  </div>
</div>

<script>
const socket = io("https://waterbridge-chat-server-production.up.railway.app");

let current = null;
const sessions = {};

const list = document.getElementById("list");
const chat = document.getElementById("chat");

socket.emit("agent-online");

/* 실시간 */
socket.on("message", (data) => {

  if (!sessions[data.sessionId]) {
    sessions[data.sessionId] = [];
    addSession(data.sessionId);
  }

  sessions[data.sessionId].push(data);

  if (current === data.sessionId) render(data.sessionId);
});

/* 세션 추가 */
function addSession(id) {
  const div = document.createElement("div");
  div.className = "session";
  div.innerText = id;

  div.onclick = () => {
    current = id;
    render(id);
  };

  list.appendChild(div);
}

/* 렌더 */
function render(id) {
  chat.innerHTML = "";

  (sessions[id] || []).forEach(m => {

    const div = document.createElement("div");

    div.className =
      "msg " + (m.from === "admin" ? "admin" :
                m.from === "bot" ? "bot" : "user");

    div.innerText = (m.from + ": " + m.text);

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* 답장 */
function send() {

  const text = document.getElementById("msg").value;

  fetch("https://waterbridge-chat-server-production.up.railway.app/reply", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ sessionId: current, text })
  });

  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
