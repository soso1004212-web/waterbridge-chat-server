<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";
const socket = io(API);

let currentSession = null;
let joinedSession = null;

// ================= CONNECT =================
socket.on("connect", () => {
  socket.emit("admin:join");
});

// ================= MESSAGE =================
socket.on("chat:message", (msg) => {

  if (msg.sessionId === currentSession) {
    addMessage(msg);
  }

  loadSessions();
});

// ================= SESSION UPDATE =================
let reloadTimer = null;

function safeReload() {
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(loadSessions, 200);
}

socket.on("admin:user_online", safeReload);
socket.on("admin:user_offline", safeReload);

// ================= SESSION LIST =================
async function loadSessions() {
  const res = await fetch(API + "/admin/sessions");
  const data = await res.json();

  const box = document.getElementById("sessionList");
  box.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "session" + (s.sessionId === currentSession ? " active" : "");

    div.innerHTML = `
      <b>${s.sessionId}</b>
      <small>${s.lastMessage || ""}</small>
    `;

    div.onclick = () => openChat(s.sessionId);
    box.appendChild(div);
  });
}

// ================= OPEN CHAT =================
async function openChat(sessionId) {

  // 🔥 기존 room 완전 정리
  socket.emit("session:leave");

  currentSession = sessionId;
  joinedSession = sessionId;

  // 🔥 중요: admin watch
  socket.emit("admin:watch", sessionId);

  const res = await fetch(API + "/admin/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(addMessage);

  document.getElementById("info").innerHTML = `
    <b>Session:</b> ${sessionId}
  `;

  loadSessions();
}

// ================= ADD MESSAGE =================
function addMessage(m) {
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + m.from;

  div.innerHTML = `<b>${m.from}</b>: ${m.text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ================= SEND =================
function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentSession) return;

  socket.emit("admin:message", {
    sessionId: currentSession,
    text,
    adminName: "상담원"
  });

  input.value = "";
}

loadSessions();
</script>
