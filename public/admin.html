<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리자 - 실시간 상담</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  display:flex;
  height:100vh;
}

#left{
  width:300px;
  border-right:1px solid #333;
  overflow-y:auto;
}

#right{
  flex:1;
  display:flex;
  flex-direction:column;
}

.session{
  padding:15px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.session:hover{
  background:#111a2c;
}

.session.active{
  background:#d4af37;
  color:#111;
}

#messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  margin-bottom:10px;
}

.msg b{
  color:#d4af37;
}

#topbar{
  padding:10px;
  background:#111a2c;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div id="left"></div>

<div id="right">
  <div id="topbar">💬 관리자 상담 패널</div>
  <div id="messages"></div>
</div>

<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";

let currentSession = null;
let activeSessionEl = null;

/* ================= 세션 로드 ================= */
async function loadSessions(){
  const res = await fetch(API + "/admin");
  const data = await res.json();

  const left = document.getElementById("left");
  left.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "session";

    const title = document.createElement("div");
    const bold = document.createElement("b");
    bold.textContent = s.sessionId;

    const small = document.createElement("small");
    small.textContent = s.lastMessage || "No message";

    title.appendChild(bold);
    div.appendChild(title);
    div.appendChild(small);

    div.onclick = () => {

      // active 유지
      if (activeSessionEl) {
        activeSessionEl.classList.remove("active");
      }

      div.classList.add("active");
      activeSessionEl = div;

      openSession(s.sessionId);
    };

    left.appendChild(div);
  });
}

/* ================= 메시지 로드 ================= */
async function openSession(sessionId){
  currentSession = sessionId;

  const res = await fetch(API + "/admin/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";

    const sender = document.createElement("b");
    sender.textContent = m.from;

    const text = document.createElement("span");
    text.textContent = " : " + m.text;

    div.appendChild(sender);
    div.appendChild(text);

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* ================= 자동 새로고침 ================= */

// 세션 목록만 5초마다 갱신
setInterval(loadSessions, 5000);

// 현재 채팅방만 2초마다 갱신
setInterval(() => {
  if (currentSession) {
    openSession(currentSession);
  }
}, 2000);

/* init */
loadSessions();
</script>
