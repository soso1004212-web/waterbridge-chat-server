<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워터브릿지 상담센터</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;background:#b2c7d9;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:320px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column}
.logo{padding:18px;font-weight:700;font-size:20px;border-bottom:1px solid #eee}
.search{padding:12px}
.search input{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px}
.sessions{flex:1;overflow:auto}
.session{padding:12px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.session:hover{background:#f8f8f8}
.session.active{background:#eef6ff}
.row{display:flex;justify-content:space-between}
.preview{font-size:12px;color:#777;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:#ff3b30;color:#fff;border-radius:999px;padding:2px 7px;font-size:11px}
.main{flex:1;display:flex;flex-direction:column}
.header{height:64px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 16px;font-weight:700}
.chat{flex:1;overflow:auto;padding:20px}
.msgrow{display:flex;margin:10px 0}
.msgrow.me{justify-content:flex-end}
.bubble{max-width:70%;padding:12px 14px;border-radius:18px;word-break:break-word}
.user{background:#fff}
.admin{background:#ffe812}
.inputbar{background:#fff;border-top:1px solid #ddd;padding:12px;display:flex;gap:10px}
.inputbar input{flex:1;padding:12px;border:1px solid #ddd;border-radius:12px}
.inputbar button{padding:0 20px;border:none;border-radius:12px;background:#ffe812;font-weight:700}
.info{width:260px;background:#fff;border-left:1px solid #ddd;padding:16px}
.card{background:#f6f7f9;border-radius:12px;padding:12px}
@media(max-width:900px){.info{display:none}.sidebar{width:280px}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="logo">💬 워터브릿지 상담센터</div>
<div class="search"><input id="search" placeholder="고객 검색"></div>
<div id="sessionList" class="sessions"></div>
</div>

<div class="main">
<div id="chatTitle" class="header">고객을 선택하세요</div>
<div id="chatBox" class="chat"></div>
<div class="inputbar">
<input id="msgInput" placeholder="메시지를 입력하세요">
<button onclick="sendMsg()">전송</button>
</div>
</div>

<div class="info">
<div class="card">
<h3>고객 정보</h3>
<div id="info">선택된 고객 없음</div>
</div>
</div>
</div>

<script>
const API="https://waterbridge-chat-server-production.up.railway.app";
const socket=io(API,{transports:["websocket","polling"]});
let currentSession=null;

socket.on("connect",()=>socket.emit("adminJoin"));

socket.on("message",(msg)=>{
 loadSessions();
 if(msg.sessionId===currentSession) addMessage(msg);
});

async function loadSessions(){
 try{
 const res=await fetch(API+"/admin/sessions");
 const data=await res.json();
 const keyword=document.getElementById("search").value.toLowerCase();
 const list=document.getElementById("sessionList");
 list.innerHTML="";
 data.filter(s=>!keyword || s.sessionId.toLowerCase().includes(keyword))
 .forEach(s=>{
   const div=document.createElement("div");
   div.className="session"+(s.sessionId===currentSession?" active":"");
   div.innerHTML=`
    <div class="row">
      <strong>${s.sessionId}</strong>
      <span class="badge">${s.unread||0}</span>
    </div>
    <div class="preview">${s.lastMessage||""}</div>`;
   div.onclick=()=>openChat(s.sessionId,s.lastMessage);
   list.appendChild(div);
 });
 }catch(e){console.error(e)}
}

async function openChat(sessionId,lastMessage){
 currentSession=sessionId;
 document.getElementById("chatTitle").innerText=sessionId;
 const res=await fetch(API+"/admin/messages/"+sessionId);
 const data=await res.json();
 const box=document.getElementById("chatBox");
 box.innerHTML="";
 data.forEach(addMessage);
 document.getElementById("info").innerHTML=
 `세션ID : ${sessionId}<br>최근메시지 : ${lastMessage||"-"}`;
 loadSessions();
}

function addMessage(m){
 const box=document.getElementById("chatBox");
 const row=document.createElement("div");
 const me=m.from==="admin";
 row.className="msgrow"+(me?" me":"");
 row.innerHTML=`<div class="bubble ${me?"admin":"user"}">${m.text}</div>`;
 box.appendChild(row);
 box.scrollTop=box.scrollHeight;
}

function sendMsg(){
 const input=document.getElementById("msgInput");
 const text=input.value.trim();
 if(!text||!currentSession) return;
 socket.emit("adminMessage",{
   sessionId:currentSession,
   text:text,
   adminName:"관리자"
 });
 addMessage({from:"admin",text:text});
 input.value="";
}

document.getElementById("msgInput").addEventListener("keydown",e=>{
 if(e.key==="Enter") sendMsg();
});

document.getElementById("search").addEventListener("input",loadSessions);

setInterval(loadSessions,3000);
loadSessions();
</script>
</body>
</html>
