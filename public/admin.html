<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Admin Chat</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  background: #0b1220;
  color: white;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* 좌측 세션 */
#sessionList {
  width: 280px;
  border-right: 1px solid #222;
  overflow-y: auto;
}

.session {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #1a2233;
}

.session:hover {
  background: #111a2b;
}

.session.active {
  background: #1f2a44;
}

/* 우측 */
#chatArea {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#info {
  padding: 10px;
  border-bottom: 1px solid #222;
  font-size: 13px;
  color: #aaa;
}

#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* 입력 */
#inputBox {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

#msgInput {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #111a2b;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px 16px;
  background: #4f7cff;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="sessionList"></div>

<div id="chatArea">
  <div id="info">세션 선택</div>
  <div id="chatBox"></div>

  <div id="inputBox">
    <input id="msgInput" placeholder="메시지 입력..." />
    <button onclick="sendMsg()">전송</button>
  </div>
</div>

<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";
const socket = io(API);

let currentSession = null;
let sessionCache = [];

// ================= CONNECT =================
socket.on("connect", () => {
  console.log("connected:", socket.id);
});

// ================= REALTIME =================
socket.on("chat:message", (msg) => {
  if (msg.sessionId === currentSession) {
    addMessage(msg);
  }
  loadSessions();
});

// ================= AUTO REFRESH =================
setInterval(loadSessions, 1000);

// ================= SESSION LIST =================
async function loadSessions() {
  try {
    const res = await fetch(API + "/admin/sessions");
    const data = await res.json();

    if (JSON.stringify(data) === JSON.stringify(sessionCache)) return;
    sessionCache = data;

    const box = document.getElementById("sessionList");
    box.innerHTML = "";

    data.forEach(s => {
      const div = document.createElement("div");
      div.className = "session" + (s.sessionId === currentSession ? " active" : "");

      div.innerHTML = `
        <div style="font-weight:600;">${s.sessionId}</div>
        <div style="font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          ${s.lastMessage || ""}
        </div>
      `;

      div.onclick = () => openChat(s.sessionId);
      box.appendChild(div);
    });

  } catch (e) {
    console.log("session error", e);
  }
}

// ================= OPEN CHAT =================
async function openChat(sessionId) {
  currentSession = sessionId;

  const res = await fetch(API + "/admin/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(addMessage);

  document.getElementById("info").innerHTML = `
    💬 상담중<br/>
    <span style="font-size:12px;color:#888">${sessionId}</span>
  `;

  scrollBottom();
  loadSessions();
}

// ================= MESSAGE UI =================
function addMessage(m) {
  const box = document.getElementById("chatBox");

  const wrap = document.createElement("div");
  wrap.style.display = "flex";
  wrap.style.margin = "6px 0";
  wrap.style.justifyContent = m.from === "admin" ? "flex-end" : "flex-start";

  const bubble = document.createElement("div");

  bubble.style.maxWidth = "65%";
  bubble.style.padding = "10px 14px";
  bubble.style.borderRadius = "16px";
  bubble.style.fontSize = "14px";
  bubble.style.wordBreak = "break-word";

  if (m.from === "admin") {
    bubble.style.background = "#4f7cff";
    bubble.style.color = "white";
    bubble.style.borderTopRightRadius = "4px";
  } else {
    bubble.style.background = "#1f2937";
    bubble.style.color = "white";
    bubble.style.borderTopLeftRadius = "4px";
  }

  bubble.innerHTML = `
    <div style="font-size:11px;opacity:0.7;margin-bottom:4px;">
      ${m.from === "admin" ? "나" : "고객"}
    </div>
    <div>${m.text}</div>
  `;

  wrap.appendChild(bubble);
  box.appendChild(wrap);

  scrollBottom();
}

// ================= SCROLL =================
function scrollBottom() {
  const box = document.getElementById("chatBox");
  box.scrollTop = box.scrollHeight;
}

// ================= SEND =================
function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentSession) return;

  socket.emit("admin:message", {
    sessionId: currentSession,
    text
  });

  input.value = "";
}

// ENTER
document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMsg();
});

loadSessions();
</script>

</body>
</html>
