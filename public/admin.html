<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";

const socket = io(API, {
  transports: ["websocket", "polling"]
});

socket.on("connect", () => {
  console.log("관리자 연결 성공");
  socket.emit("adminJoin");
});

let currentSession = null;

// ================= SOCKET =================
socket.on("message", (msg) => {
  if (msg.sessionId !== currentSession) return;
  addMessage(msg);
});

// ================= LOAD SESSIONS =================
async function loadSessions() {
  const res = await fetch(API + "/admin/sessions");
  const data = await res.json();

  const box = document.getElementById("sessionList");
  box.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "session" + (s.sessionId === currentSession ? " active" : "");

    div.innerHTML = `
      <b>${s.sessionId}</b>
      <small>${s.lastMessage || ""}</small>
    `;

    div.onclick = () => openChat(s.sessionId, s.lastMessage);

    box.appendChild(div);
  });
}

// ================= OPEN CHAT =================
async function openChat(sessionId, lastMessage) {
  currentSession = sessionId;

  const res = await fetch(API + "/admin/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(addMessage);

  document.getElementById("info").innerHTML = `
    <b>Session:</b> ${sessionId}<br>
    <b>최근:</b> ${lastMessage || "-"}
  `;

  loadSessions();
}

// ================= MESSAGE RENDER =================
function addMessage(m) {
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + m.from;

  div.innerHTML = `<b>${m.from}</b>: ${m.text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ================= SEND (버튼 + 엔터 공용) =================
window.sendMsg = function () {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentSession) return;

  socket.emit("adminMessage", {
    sessionId: currentSession,
    text: text
  });

  input.value = "";
};

// ================= ENTER KEY 전송 =================
document.getElementById("msgInput").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault(); // 줄바꿈 방지
    sendMsg();
  }
});
</script>
