<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 상담 패널</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff;}
header{padding:15px 20px;background:#111a2c;color:#d4af37;font-size:20px;font-weight:700;}
.wrapper{display:flex;height:92vh;}

.left{width:25%;border-right:1px solid #222;overflow-y:auto;background:#0e1628;}
.session{padding:15px;border-bottom:1px solid #1f2a44;cursor:pointer;}
.session:hover{background:#111a2c;}
.session.active{background:#1a2742;border-left:4px solid #d4af37;}
.session small{display:block;color:#aaa;margin-top:5px;}

.center{width:50%;display:flex;flex-direction:column;}
.chatBox{flex:1;padding:15px;overflow-y:auto;background:#111a2c;}

.msg{margin:10px 0;}
.user{color:#fff;}
.admin{color:#4fc3f7;}
.system{color:#d4af37;}

.inputBox{display:flex;border-top:1px solid #222;}
.inputBox input{flex:1;padding:15px;border:none;outline:none;background:#0b1220;color:#fff;}
.inputBox button{padding:0 20px;background:#d4af37;border:none;font-weight:700;cursor:pointer;}

.right{width:25%;border-left:1px solid #222;background:#0e1628;padding:15px;}
.infoBox{background:#111a2c;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<header>관리자 상담 패널</header>

<div class="wrapper">

  <div class="left" id="sessionList"></div>

  <div class="center">
    <div class="chatBox" id="chatBox">고객을 선택하세요</div>

    <div class="inputBox">
      <input id="msgInput" placeholder="답장 입력">
      <button onclick="sendMsg()">전송</button>
    </div>
  </div>

  <div class="right">
    <div class="infoBox">
      <h3>고객 정보</h3>
      <div id="info">없음</div>
    </div>
  </div>

</div>

<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";
const socket = io(API);

let currentSession = null;
let joinedSession = null;

// ================= CONNECT =================
socket.on("connect", () => {
  socket.emit("admin:join");
});

// ================= MESSAGE (SaaS 통일) =================
socket.on("chat:message", (msg) => {

  // 현재 보고 있는 세션만 출력
  if (msg.sessionId === currentSession) {
    addMessage(msg);
  }

  // 세션 리스트 갱신
  loadSessions();
});

// ================= SESSION EVENTS =================
socket.on("admin:user_online", loadSessions);
socket.on("admin:user_offline", loadSessions);

// ================= SESSION LIST =================
async function loadSessions() {
  const res = await fetch(API + "/admin/sessions");
  const data = await res.json();

  const box = document.getElementById("sessionList");
  box.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "session" + (s.sessionId === currentSession ? " active" : "");

    div.innerHTML = `
      <b>${s.sessionId}</b>
      <small>${s.lastMessage || ""}</small>
    `;

    div.onclick = () => openChat(s.sessionId);

    box.appendChild(div);
  });
}

// ================= OPEN CHAT =================
async function openChat(sessionId) {

  // 🔥 이전 room 완전 제거 (중복 방지 핵심)
  if (joinedSession) {
    socket.emit("session:leave");
  }

  joinedSession = sessionId;
  currentSession = sessionId;

  // 🔥 SaaS 구조: join 통일
  socket.emit("user:join", sessionId);

  const res = await fetch(API + "/admin/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(addMessage);

  document.getElementById("info").innerHTML = `
    <b>Session:</b> ${sessionId}
  `;

  loadSessions();
}

// ================= ADD MESSAGE =================
function addMessage(m) {
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + m.from;

  div.innerHTML = `<b>${m.from}</b>: ${m.text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ================= SEND =================
function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentSession) return;

  socket.emit("admin:message", {
    sessionId: currentSession,
    text,
    adminName: "상담원"
  });

  input.value = "";
}

// ❌ setInterval 제거 (중복/깜빡임 원인)
// setInterval(loadSessions, 3000);

loadSessions();
</script>

</body>
</html>
