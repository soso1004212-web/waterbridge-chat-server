<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 상담 패널</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

/* HEADER */
header{
  padding:15px 20px;
  background:#111a2c;
  color:#d4af37;
  font-size:20px;
  font-weight:700;
}

/* MAIN LAYOUT */
.wrapper{
  display:flex;
  height:92vh;
}

/* LEFT - SESSION LIST */
.left{
  width:25%;
  border-right:1px solid #222;
  overflow-y:auto;
  background:#0e1628;
}

.session{
  padding:15px;
  border-bottom:1px solid #1f2a44;
  cursor:pointer;
  transition:0.2s;
}

.session:hover{
  background:#111a2c;
}

.session.active{
  background:#1a2742;
  border-left:4px solid #d4af37;
}

.session small{
  display:block;
  color:#aaa;
  margin-top:5px;
}

/* CENTER - CHAT */
.center{
  width:50%;
  display:flex;
  flex-direction:column;
}

.chatBox{
  flex:1;
  padding:15px;
  overflow-y:auto;
  background:#111a2c;
}

.msg{
  margin:10px 0;
  line-height:1.4;
}

.user{ color:#fff; }
.bot{ color:#d4af37; }
.admin{ color:#4fc3f7; }

/* INPUT */
.inputBox{
  display:flex;
  border-top:1px solid #222;
}

.inputBox input{
  flex:1;
  padding:15px;
  border:none;
  outline:none;
  background:#0b1220;
  color:#fff;
}

.inputBox button{
  padding:0 20px;
  background:#d4af37;
  border:none;
  font-weight:700;
  cursor:pointer;
}

/* RIGHT - INFO PANEL */
.right{
  width:25%;
  border-left:1px solid #222;
  background:#0e1628;
  padding:15px;
}

.infoBox{
  background:#111a2c;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  background:#1f2a44;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>관리자 상담 패널 (멀티 고객 관리)</header>

<div class="wrapper">

  <!-- LEFT -->
  <div class="left" id="sessionList"></div>

  <!-- CENTER -->
  <div class="center">

    <div class="chatBox" id="chatBox">
      고객을 선택하세요
    </div>

    <div class="inputBox">
      <input id="msgInput" placeholder="답장 입력">
      <button onclick="sendMsg()">전송</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="infoBox">
      <h3>고객 정보</h3>
      <div id="info">선택된 고객 없음</div>
    </div>
  </div>

</div>

<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";

let currentSession = null;

// ================= LOAD SESSIONS =================
async function loadSessions() {
  const res = await fetch(API + "/sessions");
  const data = await res.json();

  const box = document.getElementById("sessionList");
  box.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "session" + (s.sessionId === currentSession ? " active" : "");

    div.innerHTML = `
      <b>${s.sessionId}</b>
      <small>${s.lastMessage || "메시지 없음"}</small>
    `;

    div.onclick = () => openChat(s.sessionId, s.lastMessage);

    box.appendChild(div);
  });
}

// ================= OPEN CHAT =================
async function openChat(sessionId, lastMessage) {
  currentSession = sessionId;

  const res = await fetch(API + "/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.from;
    div.innerHTML = `<b>${m.from}</b>: ${m.text}`;
    box.appendChild(div);
  });

  document.getElementById("info").innerHTML = `
    <b>Session:</b> ${sessionId}<br>
    <span class="badge">활성 채팅</span><br><br>
    <b>최근 메시지:</b><br>
    ${lastMessage || "-"}
  `;

  loadSessions();
}

// ================= SEND MESSAGE =================
async function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !currentSession) return;

  await fetch(API + "/messages/" + currentSession, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      sessionId: currentSession,
      text,
      from: "admin"
    })
  });

  input.value = "";
  openChat(currentSession);
}

// ================= AUTO REFRESH =================
setInterval(loadSessions, 3000);

loadSessions();
</script>

</body>
</html>
