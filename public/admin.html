<script>
const API = "https://waterbridge-chat-server-production.up.railway.app";
const socket = io(API);

let currentSession = null;

// ================= CONNECT =================
socket.on("connect", () => {
  socket.emit("admin:join");
});

// ================= MESSAGE =================
socket.on("chat:message", (msg) => {
  if (msg.sessionId === currentSession) {
    addMessage(msg);
  }
  loadSessions();
});

// ================= SESSION LIST =================
async function loadSessions() {
  const res = await fetch(API + "/admin/sessions");
  const data = await res.json();

  const box = document.getElementById("sessionList");
  box.innerHTML = "";

  data.forEach(s => {
    const div = document.createElement("div");
    div.className = "session" + (s.sessionId === currentSession ? " active" : "");

    div.innerHTML = `
      <b>${s.sessionId}</b><br/>
      <small>${s.lastMessage || ""}</small>
    `;

    div.onclick = () => openChat(s.sessionId);
    box.appendChild(div);
  });
}

// ================= OPEN CHAT =================
async function openChat(sessionId) {
  currentSession = sessionId;

  socket.emit("admin:watch", sessionId);

  const res = await fetch(API + "/admin/messages/" + sessionId);
  const data = await res.json();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(addMessage);

  document.getElementById("info").innerHTML =
    `<b>Session:</b> ${sessionId}`;

  loadSessions();
}

// ================= MESSAGE UI =================
function addMessage(m) {
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + m.from;

  div.innerHTML = `
    <div><b>${m.from}</b></div>
    <div>${m.text}</div>
  `;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ================= SEND =================
function sendMsg() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || !currentSession) return;

  socket.emit("admin:message", {
    sessionId: currentSession,
    text,
    adminName: "상담원"
  });

  input.value = "";
}

document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMsg();
});

loadSessions();
</script>
